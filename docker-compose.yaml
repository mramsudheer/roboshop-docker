services:
  catalogue:
    build: ./catalogue
    image: mramsudheer/roboshop:catalogue-1.1.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: mramsudheer/roboshop:user-1.1.0
    container_name: user
    depends_on:
    - redis
    - mongodb
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017/users
  cart:
    build: ./cart
    image: mramsudheer/roboshop:cart-1.1.0
    container_name: cart
    depends_on:
    - redis
    - catalogue
  shipping:
    build: ./shipping
    image: mramsudheer/roboshop:shipping-1.1.0
    container_name: shipping
    depends_on:
    - mysql
    - cart
    environment:
      - CART_ENDPOINT=cart:8080
      - DB_HOST=mysql
  payment:
    build: ./payment
    image: mramsudheer/roboshop:payment-1.1.0
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
    - rabbitmq
    - cart
    - user
  frontend:
    build: ./frontend
    image: mramsudheer/roboshop:frontend-1.1.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
    - payment
  mongodb:
    build: ./mongodb # it moves to mongodb directory
    image: mramsudheer/roboshop:mongodb-1.0.0 # docker build -t mramsudheer/roboshop:mongodb-1.0.0
    container_name: mongodb
    volumes:
    - mongodb:/data/db
  redis:
    #image: redis:7.0
    image: mramsudheer/roboshop:redis-7.0
    container_name: redis
    volumes:
    - redis:/data
  mysql:
    build: ./mysql
    image: mramsudheer/roboshop:mysql-1.0.0
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql
  rabbitmq:
    #image: rabbitmq:3
    image: mramsudheer/roboshop:rabbitmq-3
    environment: 
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq
    volumes:
    - rabbitmq:/var/lib/rabbitmq
networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually
volumes:
  mongodb: # docker volume create mongodb
  redis:
  mysql:
  rabbitmq: